services:

  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "${ZALO_WEBHOOK_PORT:-8080}:8080"
    volumes:
      - ${HOME}/.claude:/root/.claude:ro
      - ${PROJECTS_DIR:-/tmp/projects}:/projects
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "127.0.0.1:27017:27017"

volumes:
  mongo_data:
