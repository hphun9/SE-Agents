services:

  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      # Claude Code auth — run `claude` interactively on the host first
      - ${HOME}/.claude:/root/.claude:ro
      # Mount local projects so /fix can access them
      # Usage: /fix /projects/my-app Fix the login error
      - ${PROJECTS_DIR:-/tmp/projects}:/projects
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    # Expose only if you need external access (comment out in prod)
    ports:
      - "127.0.0.1:27017:27017"

volumes:
  mongo_data:
